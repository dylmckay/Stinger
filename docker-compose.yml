name: stinger

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stinger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stinger}
      POSTGRES_DB: ${POSTGRES_DB:-stinger}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stinger} -d ${POSTGRES_DB:-stinger}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Not published by default — Stinger reaches it over the compose network.
    # Uncomment to inspect from the host:
    # ports: ["5432:5432"]

  # One-shot: bring the schema to head, then exit. api/worker wait for success.
  migrate:
    image: stinger:local
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    image: stinger:local        # built once here; migrate/worker reuse this tag
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    image: stinger:local
    command: ["python", "-m", "app.worker_main"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
